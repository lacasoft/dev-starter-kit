name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Validar integridad del kit
        run: node scripts/validate.cjs
      - name: Tests (hook-handler — guards y escáner de secretos)
        run: node --test
      - name: Smoke test del instalador (dry-run por stack)
        run: |
          set -e
          # Lista derivada de STACKS en install.js (fuente única; ver scripts/stacks.cjs)
          for s in $(node scripts/stacks.cjs); do
            echo "--- $s ---"
            tmp="$(mktemp -d)"
            ( cd "$tmp" && node "$GITHUB_WORKSPACE/install.js" --yes --no-flow --no-external --stack "$s" --dry-run >/dev/null )
            rm -rf "$tmp"
          done
          echo "✅ instalador OK en todos los stacks ($(node scripts/stacks.cjs | wc -l))"
